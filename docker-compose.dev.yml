version: '3.9'

# Development environment — dependencies installed inside the container,
# source code mounted as a volume for hot-reload.
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up
#
# The app will be available at http://localhost:3000

services:
  frontend-dev:
    image: node:20-alpine
    container_name: manager_frontend_dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules   # isolated from host
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=         # empty = uses Vite proxy to backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  node_modules:
